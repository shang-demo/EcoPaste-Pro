name: Build on Sync

on:
  workflow_call:
  workflow_dispatch:
    inputs:
      create_release:
        description: '创建 GitHub Release'
        required: false
        type: boolean
        default: true

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    
    env:
      CI: false
      # 注意：如需启用自动更新签名，请在仓库 Secrets 中配置 TAURI_PRIVATE_KEY 和 TAURI_KEY_PASSWORD
      # TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
      # TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version info
        id: version
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          # 直接使用 package.json 中的版本号，不再追加编号后缀
          GIT_HASH=$(git rev-parse --short HEAD)
          GIT_DESC="v${VERSION}-${GIT_HASH}"
          # GitHub Actions 运行在 UTC 环境，手动加 8 小时
          BUILD_TIME=$(date -u -d '+8 hours' +'%Y-%m-%d %H:%M:%S UTC+8')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "git_desc=$GIT_DESC" >> $GITHUB_OUTPUT
          echo "build_time=$BUILD_TIME" >> $GITHUB_OUTPUT
          echo "file_prefix=EcoPaste_${VERSION}" >> $GITHUB_OUTPUT

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Windows app (x64)
        run: pnpm tauri build --target x86_64-pc-windows-msvc

      - name: Rename artifacts
        shell: bash
        run: |
          mkdir -p dist
          cp target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe "dist/${{ steps.version.outputs.file_prefix }}_x64-setup.exe"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64-build
          path: dist/*.exe
          retention-days: 7
          compression-level: 0

      - name: Create Release
        if: github.event.inputs.create_release != 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: "EcoPaste_v${{ steps.version.outputs.version }}"
          body: |
            ## EcoPaste-Pro 增强版
            
            基于官方 EcoPaste 的增强 Fork 版本，包含以下改进：
            
            ### ✨ Pro.5.4
            #### ✨ 新增功能
            - 上线轻量数据同步模块，支持推送、接收数据分类管理
            - 多入口新增主动推送，可将单条剪贴内容下发至外部设备
            - 提供三档自动推送规则，支持收藏、自定义标签触发推送
            - 搭建本地接收服务，多格式内容自动入库，可回写系统剪贴板
            - 内置五种图片中转策略，灵活配置图片推送与拦截规则
            - 远端同步内容自动标注设备来源，可视化区分外部传入数据
            
            #### 💫 体验优化
            - 优化代码预览换行裁切，解决长代码横向溢出
            - 增强 HTML 主题适配，智能修正文字对比度，兼顾明暗模式可读性
            - 新增防同步回环机制，避免重复入库、循环推送
            - 统一图片接收转码与元数据归档，提升小众图片格式兼容性
            
            #### 🏗️ 架构优化
            - 推送链路改为异步队列，不阻塞剪贴板核心监听流程
            - 配置分层存储，敏感凭据独立加密存放，保障安全
            
            #### 🐞 bug 修复
            - 重构操作按钮拖拽逻辑，修复自定义按钮无法排序的 Bug，同时兼容文件拖拽导入功能

            ### 🕒 过往版本核心特性归纳
            - 全面升级全局快捷无感粘贴体系，重构优化表格识别、列表展示以及界面组件边缘布局越界隐患 (Pro.5.3)
            - 扩展完善数据维度筛选导出与拖拽导入恢复机制，升级 VS Code 同款级代码语法高亮沉浸阅读 (Pro.5.2)
            - 突破性引入存储空间全景可视化大屏与时间轴线过滤联动，配合独立强效类型批量瘦身清洗防误删引擎 (M05.1)
            - 深化构筑高阶多维联合筛选漏斗，追加全息详情气泡浮窗及 SVG 富文本精准校验过滤能力 (M05.0)
            - 向下兼容架构加固（DB 查询防护 + 配置深拷贝）、分组切换竞态条件修复，来源应用信息修正 (M04.5/M04.6)
            - 支持文本片段选取与浮动工具栏快速操作，独立开关控制 (M04.4)
            - CMYK 颜色识别，右键菜单按 12 种内容类型专属定制重构 (M04.3)
            - Windows 路径与指令智能识别一键打开，配置文件自动同步 (M04.2)
            - WebDAV 备份调度引擎（定时/间隔/Cron），Markdown 智能识别与沉浸编辑，图片目录定位 (M04.1)
            - 支持基于 WebDAV 的云备份与恢复，且各项敏感核心配置均已对接 Windows 系统底层自带的凭据管理器安全护航 (M03)，并提供图片可选不清理本地原文件的独立管理 (M03)
            - "链接""颜色""代码"原生命中群组分类提取，以及原始应用图标来源追溯 (M02)
            - 富文本与图片的大弹窗沉浸独立编辑框，并配有媲美 IDE 的代码片段语法高亮全彩识别 (M02)
            - 主程序支持不夺焦静默纯后台呼出、贴图自动跟随输入光标，列表项行高及长文图片跨滚动折叠状态记录 (M01/M02)
            - 强力接管解决原版官方核心无法向系统任何自定义路径成功存盘截屏图片的致命红叉 Bug (M01)
            
            ### 📋 版本信息
            - **版本**: ${{ steps.version.outputs.version }}
            - **构建时间**: ${{ steps.version.outputs.build_time }}
            - **Git 描述**: ${{ steps.version.outputs.git_desc }}
            
            ### ⚠️ 注意事项
            - 此版本禁用了自动更新功能，避免与官方版本冲突
            - 配置文件与官方版本兼容，可直接替换使用
          draft: false
          prerelease: true
          files: dist/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
